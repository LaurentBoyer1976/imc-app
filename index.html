<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC Projet - Phase 1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .divi-imc-wrapper { font-family: "Lato", sans-serif; max-width: 600px; margin: 20px auto; }
        .imc-container { background-color: #fff; border-radius: 7px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .imc-header { background-color: #18387d; padding: 15px; color: white; text-align: center; }
        .imc-body { padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .imc-form { width: 100%; }
        .imc-fieldset { border: 0; margin: 0; padding: 0; width: 100%; }
        .imc-legend { font-weight: 700; margin-bottom: 16px; }
        .imc-input-flex { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        .imc-input-flex > div { flex: 1; }
        .imc-input-flex label { display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; }
        button { width: 50%; padding: 12px; background-color: #18387d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result-box { margin-top: 20px; text-align: center; padding: 20px; background: #eee; border-radius: 7px; border: 1px dashed #bbb; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    // --- COMPOSANTS ENFANTS ---

    // 1. L'entête
    function Header() {
        return (
            <header className="imc-header">
                <h2>Calculateur IMC - Phase 1</h2>
            </header>
        );
    }

    // 2. Le formulaire
    function ImcForm() {
        return (
            <form className="imc-body imc-form" onSubmit={(event) => event.preventDefault()}>
                <fieldset className="imc-fieldset">
                    <legend className="imc-legend">Saisir les données</legend>
                    <div className="imc-input-flex">
                        <div>
                            <label htmlFor="taille">
                                Taille (cm)
                                <input id="taille" name="taille" type="number" placeholder="Taille (cm)" min="0" step="0.1" />
                            </label>
                        </div>
                        <div>
                            <label htmlFor="poids">
                                Poids (kg)
                                <input id="poids" name="poids" type="number" placeholder="Poids (kg)" min="0" step="0.1" />
                            </label>
                        </div>
                    </div>
                    <button type="submit">Calculer</button>
                </fieldset>
            </form>
        );
    }

    // 3. L'affichage du résultat
    function ResultDisplay() {
        return (
            <section className="result-box" aria-live="polite" aria-atomic="true">
                <p style={{fontSize: '24px', fontWeight: 'bold'}}>--</p>
                <p>Le calcul sera activé en Phase 2.</p>
            </section>
        );
    }

    // --- COMPOSANT PARENT ---
    function App() {
        return (
            <main className="divi-imc-wrapper">
                <div className="imc-container">
                    <Header />
                    <ImcForm />
                </div>
                <ResultDisplay />
            </main>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>
</body>
</html>
